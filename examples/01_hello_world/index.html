<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octane — C++ Web Framework</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <nav>
        <div class="logo-wrap">
            <span class="logo-O">
                O
                <span class="fire-wrap">
                    <svg width="80" height="70" viewBox="0 0 80 70">
                        <g class="f1">
                            <path d="M40 70 C20 55, 10 35, 22 18 C25 30, 30 28, 32 20 C35 32, 28 45, 40 52 C42 40, 50 38, 48 25 C55 35, 58 50, 50 62 C52 50, 48 42, 44 48 C50 35, 45 20, 38 10 C42 22, 46 20, 44 12 C52 22, 58 15, 54 5 C62 18, 65 38, 58 55 C60 42, 55 36, 50 40 C56 28, 52 15, 46 8 C50 20, 54 18, 52 10 C58 22, 60 40, 52 55 C55 44, 50 38, 46 44 C52 32, 46 18, 40 10 Z" fill="#ff2200" opacity="0.9"/>
                        </g>
                        <g class="f2">
                            <path d="M40 70 C25 58, 18 40, 28 22 C30 32, 36 30, 34 20 C40 34, 33 46, 42 54 C45 42, 52 40, 50 28 C56 38, 58 52, 50 64 Z" fill="#ff6600" opacity="0.85"/>
                        </g>
                        <g class="f3">
                            <path d="M40 70 C28 60, 24 44, 32 28 C34 36, 38 34, 37 26 C42 36, 36 48, 44 56 C46 46, 50 44, 48 34 C53 42, 54 54, 46 66 Z" fill="#ffaa00" opacity="0.8"/>
                        </g>
                        <g class="glow">
                            <path d="M40 70 C32 62, 30 50, 36 38 C37 44, 40 42, 39 36 C42 42, 39 52, 44 58 C45 50, 47 48, 46 42 C49 48, 49 56, 44 66 Z" fill="#ffdd00" opacity="0.7"/>
                        </g>
                    </svg>
                </span>
            </span>
            <span class="logo-ctane">ctane</span>
            <span class="logo-tcp">tcp</span>
        </div>

        <div class="gear-wrap">
            <svg width="80" height="70" viewBox="0 0 100 90">
                <g class="gear-big">
                    <circle cx="38" cy="42" r="24" fill="none" stroke="#ff7b00" stroke-width="3.5"/>
                    <circle cx="38" cy="42" r="10" fill="none" stroke="#ff7b00" stroke-width="2.5"/>
                    <rect x="35" y="13"  width="5" height="12" rx="2" fill="#ff7b00"/>
                    <rect x="35" y="57"  width="5" height="12" rx="2" fill="#ff7b00"/>
                    <rect x="13" y="39"  width="12" height="5" rx="2" fill="#ff7b00"/>
                    <rect x="57" y="39"  width="12" height="5" rx="2" fill="#ff7b00"/>
                    <rect x="20" y="20"  width="5" height="12" rx="2" transform="rotate(45 22 26)"  fill="#ff7b00"/>
                    <rect x="53" y="20"  width="5" height="12" rx="2" transform="rotate(-45 55 26)" fill="#ff7b00"/>
                    <rect x="20" y="50"  width="5" height="12" rx="2" transform="rotate(-45 22 56)" fill="#ff7b00"/>
                    <rect x="53" y="50"  width="5" height="12" rx="2" transform="rotate(45 55 56)"  fill="#ff7b00"/>
                </g>
                <g class="gear-small">
                    <circle cx="74" cy="60" r="16" fill="none" stroke="#BA7517" stroke-width="3"/>
                    <circle cx="74" cy="60" r="7"  fill="none" stroke="#BA7517" stroke-width="2"/>
                    <rect x="71" y="39"  width="5" height="10" rx="2" fill="#BA7517"/>
                    <rect x="71" y="71"  width="5" height="10" rx="2" fill="#BA7517"/>
                    <rect x="53" y="57"  width="10" height="5" rx="2" fill="#BA7517"/>
                    <rect x="85" y="57"  width="10" height="5" rx="2" fill="#BA7517"/>
                    <rect x="57" y="44"  width="5" height="10" rx="2" transform="rotate(45 59 49)"  fill="#BA7517"/>
                    <rect x="85" y="44"  width="5" height="10" rx="2" transform="rotate(-45 87 49)" fill="#BA7517"/>
                    <rect x="57" y="66"  width="5" height="10" rx="2" transform="rotate(-45 59 71)" fill="#BA7517"/>
                    <rect x="85" y="66"  width="5" height="10" rx="2" transform="rotate(45 87 71)"  fill="#BA7517"/>
                </g>
            </svg>
        </div>
    </nav>

    <main>
        <div class="hero">
            <p class="tagline">C++ Web Framework &middot; Zero Copy &middot; Blazing Fast</p>

            <div class="stats">
                <div class="stat">
                    <div class="stat-value">300k+</div>
                    <div class="stat-label">req/s</div>
                </div>
                <div class="stat">
                    <div class="stat-value">0</div>
                    <div class="stat-label">vtable</div>
                </div>
                <div class="stat">
                    <div class="stat-value">mmap</div>
                    <div class="stat-label">file serving</div>
                </div>
                <div class="stat">
                    <div class="stat-value">C++20</div>
                    <div class="stat-label">standard</div>
                </div>
            </div>

            <div class="code-block">
                <span class="cmt">// that's it. that's the whole server.</span><br>
                <span class="kw">app</span>.<span class="fn">get</span>&lt;<span class="type">GetUser</span>&gt;(<span class="str">"/users/:id"</span>);<br>
                <span class="kw">app</span>.<span class="fn">post</span>&lt;<span class="type">CreateUser</span>&gt;(<span class="str">"/users"</span>);<br>
                <span class="kw">app</span>.<span class="fn">listen</span>(<span class="num">8080</span>);
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <h2>Request counter</h2>
                <p>Clicked <span id="count">0</span> times.</p>
                <button id="btn">Click me</button>
            </div>

            <div class="card">
                <h2>Fetch from API</h2>
                <button id="fetch-btn">GET /api/hello</button>
                <pre id="response">—</pre>
            </div>
        </div>
    </main>

    <script src="/app.js"></script>
</body>
</html>
